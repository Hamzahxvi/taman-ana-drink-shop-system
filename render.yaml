services:
  - type: web
    name: taman-ana
    runtime: docker
    plan: free
    envVars:
      - key: APP_NAME
        value: Taman Ana
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: taman-ana-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: taman-ana-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: taman-ana-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: taman-ana-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: taman-ana-db
          property: password
      - key: FILESYSTEM_DISK
        value: local
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: MAIL_MAILER
        value: log

databases:
  - name: taman-ana-db
    plan: free
